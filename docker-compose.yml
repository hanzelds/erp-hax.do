version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL — Base de datos principal
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp_hax_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hax_user
      POSTGRES_PASSWORD: hax_password
      POSTGRES_DB: erp_hax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hax_user -d erp_hax"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — Queue de Alanube + Caché
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_hax_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Adminer — UI de base de datos (dev only)
  # ─────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: erp_hax_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: erp_hax_network
